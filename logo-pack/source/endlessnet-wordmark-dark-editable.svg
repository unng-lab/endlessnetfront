<svg xmlns="http://www.w3.org/2000/svg" width="760" height="170" viewBox="0 0 760 170" role="img" aria-labelledby="title desc">
  <title id="title">EndlessNet wordmark — dark</title>
  <desc id="desc">EndlessNet private networking logo</desc>

<defs>
  <linearGradient id="w-dark-gradient" x1="0" y1="0" x2="280" y2="120" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#19D8F2"/>
    <stop offset="0.58" stop-color="#128CFF"/>
    <stop offset="1" stop-color="#244BFF"/>
  </linearGradient>
</defs>
<text x="12" y="120" font-family="Inter Display, Inter, Arial, sans-serif" font-size="112" font-weight="500" letter-spacing="-3"><tspan fill="#F5F8FC">Endless</tspan><tspan fill="url(#w-dark-gradient)">Net</tspan></text>
</svg>
