<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="EndlessNet admin login">
  <title>EndlessNet Admin Login</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script src="../config.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8f6;
      --surface: #ffffff;
      --line: #d7e0dc;
      --text: #17211d;
      --muted: #69766f;
      --green: #28735f;
      --green-dark: #1d5a4a;
      --shadow: 0 18px 48px rgba(22, 33, 29, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .brand img {
      width: 78px;
      height: 36px;
      object-fit: contain;
    }
    .brand strong,
    .brand span {
      display: block;
    }
    .brand span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }
    .providers {
      display: grid;
      gap: 10px;
    }
    a.provider {
      min-height: 44px;
      border-radius: 8px;
      background: var(--green);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      padding: 0 16px;
    }
    a.provider:hover { background: var(--green-dark); }
    .loading,
    .empty {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: var(--muted);
    }
    .error {
      display: none;
      margin-top: 14px;
      color: #b42318;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="brand">
        <img src="assets/assets/brand-mark.png" alt="">
        <div>
          <strong>EndlessNet</strong>
          <span>Admin Console</span>
        </div>
      </div>
      <h1>Вход в админку</h1>
      <p>Выберите доступный провайдер авторизации.</p>
      <div class="providers" id="providers">
        <div class="loading">Загрузка провайдеров...</div>
      </div>
      <div class="error" id="errorBox"></div>
    </section>
  </main>
  <script>
    (function () {
      var tokenKey = "endlessnet.token";
      var params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      var token = (params.get("token") || "").trim();
      if (token) {
        localStorage.setItem(tokenKey, token);
        window.location.replace("./");
        return;
      }
      if ((localStorage.getItem(tokenKey) || "").trim()) {
        window.location.replace("./");
        return;
      }
      var configured = String(window.ENDLESSNET_API_BASE || "").trim().replace(/\/+$/, "");
      var apiBase = configured || location.origin.replace(/\/+$/, "");
      var providersEl = document.getElementById("providers");
      var errorBox = document.getElementById("errorBox");

      function showError(message) {
        providersEl.innerHTML = "";
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function renderProviders(providers) {
        providersEl.innerHTML = "";
        if (!providers.length) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Провайдеры авторизации не настроены.";
          providersEl.appendChild(empty);
          return;
        }
        providers.forEach(function (provider) {
          var id = String(provider.id || "").trim();
          var name = String(provider.name || id).trim();
          var loginURL = String(provider.login_url || "").trim();
          if (!id || !name || !loginURL) {
            return;
          }
          var link = document.createElement("a");
          link.className = "provider";
          link.href = new URL(loginURL, apiBase).href;
          link.textContent = name;
          providersEl.appendChild(link);
        });
        if (!providersEl.children.length) {
          showError("Backend вернул некорректный список провайдеров.");
        }
      }

      function parseProvidersFromLoginHTML(html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        return Array.prototype.slice.call(doc.querySelectorAll('a[href*="/auth/login?provider="]'))
          .map(function (link) {
            var href = link.getAttribute("href") || "";
            var name = (link.textContent || "").trim();
            try {
              var parsed = new URL(href, apiBase);
              var id = (parsed.searchParams.get("provider") || "").trim();
              return id && name ? {
                id: id,
                name: name,
                login_url: parsed.pathname + parsed.search
              } : null;
            } catch (error) {
              return null;
            }
          })
          .filter(Boolean);
      }

      function loadProvidersFromLoginPage() {
        return fetch(new URL("/auth/login", apiBase).href)
          .then(function (response) {
            if (!response.ok) {
              throw new Error(response.status + ": " + response.statusText);
            }
            return response.text();
          })
          .then(function (html) {
            renderProviders(parseProvidersFromLoginHTML(html));
          });
      }

      try {
        var providersURL = new URL("/auth/providers", apiBase).href;
        fetch(providersURL, { headers: { "Accept": "application/json" } })
          .then(function (response) {
            if (!response.ok) {
              throw new Error(response.status + ": " + response.statusText);
            }
            return response.json();
          })
          .then(function (payload) {
            renderProviders(Array.isArray(payload.providers) ? payload.providers : []);
          })
          .catch(function (error) {
            loadProvidersFromLoginPage().catch(function () {
              showError("Не удалось загрузить провайдеров авторизации: " + error.message);
            });
          });
      } catch (error) {
        var box = document.getElementById("errorBox");
        box.textContent = "Некорректная конфигурация API: " + error.message;
        box.style.display = "block";
      }
    })();
  </script>
</body>
</html>
