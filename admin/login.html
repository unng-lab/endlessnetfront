<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Вход в админку EndlessNet">
  <title>Вход в админку EndlessNet</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script src="../config.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101e;
      --bg-deep: #040914;
      --surface: rgba(255, 255, 255, .055);
      --line: rgba(158, 184, 235, .16);
      --text: #f6f9ff;
      --muted: #b4c1da;
      --muted-2: #7d8dad;
      --cyan: #35d5ff;
      --danger: #ff8173;
      --shadow: 0 24px 70px rgba(0, 0, 0, .34);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg) 0%, #070c18 48%, var(--bg-deep) 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(18px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .brand img {
      width: 164px;
      height: 48px;
      object-fit: contain;
    }
    .brand strong,
    .brand span {
      display: block;
    }
    .brand span {
      margin-top: 2px;
      color: var(--muted-2);
      font-size: 13px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }
    .login-options {
      display: grid;
      gap: 10px;
    }
    a.login-option {
      min-height: 44px;
      border-radius: 8px;
      background: linear-gradient(135deg, #77a7ff 0%, var(--cyan) 100%);
      color: #05111f;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,.40);
      box-shadow: 0 14px 38px rgba(77,140,255,.24), inset 0 1px 0 rgba(255,255,255,.54);
    }
    a.login-option:hover { filter: brightness(1.05); }
    .loading,
    .empty {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: var(--muted);
    }
    .error {
      display: none;
      margin-top: 14px;
      color: var(--danger);
      font-size: 13px;
    }
    @media (max-width: 520px) {
      main { padding: 18px; }
      .panel { padding: 20px; }
      .brand img { width: 140px; height: 42px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="brand">
        <img src="assets/assets/brand-logo.png" alt="EndlessNet">
        <div>
          <span>Админка</span>
        </div>
      </div>
      <h1>Вход в админку</h1>
      <p>Выберите способ входа.</p>
      <div class="login-options" id="loginOptions">
        <div class="loading">Загрузка способов входа...</div>
      </div>
      <div class="error" id="errorBox"></div>
    </section>
  </main>
  <script>
    (function () {
      var tokenKey = "endlessnet.token";
      var params = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      var token = (params.get("token") || "").trim();
      if (token) {
        localStorage.setItem(tokenKey, token);
        window.location.replace("./");
        return;
      }
      if ((localStorage.getItem(tokenKey) || "").trim()) {
        window.location.replace("./");
        return;
      }
      var configured = String(window.ENDLESSNET_API_BASE || "").trim().replace(/\/+$/, "");
      var apiBase = configured || location.origin.replace(/\/+$/, "");
      var optionsEl = document.getElementById("loginOptions");
      var errorBox = document.getElementById("errorBox");

      function showError(message) {
        optionsEl.innerHTML = "";
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function renderLoginOptions(providers) {
        optionsEl.innerHTML = "";
        if (!providers.length) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Способы входа не настроены.";
          optionsEl.appendChild(empty);
          return;
        }
        providers.forEach(function (provider) {
          var id = String(provider.id || "").trim();
          var name = String(provider.name || id).trim();
          var loginURL = String(provider.login_url || "").trim();
          if (!id || !name || !loginURL) {
            return;
          }
          var link = document.createElement("a");
          link.className = "login-option";
          link.href = new URL(loginURL, apiBase).href;
          link.textContent = name;
          optionsEl.appendChild(link);
        });
        if (!optionsEl.children.length) {
          showError("Не удалось подготовить список входа.");
        }
      }

      function parseProvidersFromLoginHTML(html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        return Array.prototype.slice.call(doc.querySelectorAll('a[href*="/auth/login?provider="]'))
          .map(function (link) {
            var href = link.getAttribute("href") || "";
            var name = (link.textContent || "").trim();
            try {
              var parsed = new URL(href, apiBase);
              var id = (parsed.searchParams.get("provider") || "").trim();
              return id && name ? {
                id: id,
                name: name,
                login_url: parsed.pathname + parsed.search
              } : null;
            } catch (error) {
              return null;
            }
          })
          .filter(Boolean);
      }

      function loadProvidersFromLoginPage() {
        return fetch(new URL("/auth/login", apiBase).href)
          .then(function (response) {
            if (!response.ok) {
              throw new Error(response.status + ": " + response.statusText);
            }
            return response.text();
          })
          .then(function (html) {
            renderLoginOptions(parseProvidersFromLoginHTML(html));
          });
      }

      try {
        var providersURL = new URL("/auth/providers", apiBase).href;
        fetch(providersURL, { headers: { "Accept": "application/json" } })
          .then(function (response) {
            if (!response.ok) {
              throw new Error(response.status + ": " + response.statusText);
            }
            return response.json();
          })
          .then(function (payload) {
            renderLoginOptions(Array.isArray(payload.providers) ? payload.providers : []);
          })
          .catch(function (error) {
            loadProvidersFromLoginPage().catch(function () {
              showError("Не удалось загрузить способы входа.");
            });
          });
      } catch (error) {
        var box = document.getElementById("errorBox");
        box.textContent = "Не удалось открыть вход.";
        box.style.display = "block";
      }
    })();
  </script>
</body>
</html>
